spring:
  application:
    name: place-service
  datasource:
    url: jdbc:mysql://localhost:3306/travel
    username: root
    password: password

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  cache:
    type: redis

server:
  port: 8081

logging:
  level:
    root: INFO